name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run `authsome login github`, it...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: I expected it to...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `authsome login github`
        2. ...
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste any error messages or tracebacks here.
      render: shell

  - type: input
    id: version
    attributes:
      label: authsome version
      description: Output of `authsome --version`
      placeholder: "0.1.7"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.12.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14.4 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Provider name, flow type, or anything else that might help.
