name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what use case does it unlock?
      placeholder: I often need to... but currently there's no way to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried, or other approaches you considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of authsome does this touch?
      options:
        - CLI
        - SDK / AuthClient
        - Auth flows (PKCE, device code, DCR, API key)
        - Provider registry / bundled providers
        - Storage / encryption
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art, or anything else relevant.
